          <script>
          document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.ground');
            const items = Array.from(container.querySelectorAll('.div-center'));

              // 投稿順：古い順（昇順）
              function sortByDateAsc() {
                items.sort((a, b) => {
                  const da = new Date(a.dataset.postDate);
                  const db = new Date(b.dataset.postDate); 
                  return da - db;
                });
    
                items.forEach(item => container.appendChild(item));
              }

                // 投稿順：新しい順（降順）
                function sortByDateDesc() {
                  items.sort((a, b) => {
                    const da = new Date(a.dataset.postDate);
                    const db = new Date(b.dataset.postDate);
                    return db - da;
                  });
                  items.forEach(item => container.appendChild(item));
                }

                document.getElementById('sort-mode').addEventListener('change', e => {
   
                  switch (e.target.value) {
                    case 'date-asc':
                    sortByDateAsc();
                    break;

                    case 'date-desc':
                    sortByDateDesc();
                    break;
                  }
                });

  sortByDateDesc();
});
</script>
